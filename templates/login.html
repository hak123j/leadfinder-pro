<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder Pro — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #07070a; --bg1: #0c0c10; --bg2: #131318; --bg3: #1b1b22; --bg4: #24242e;
            --accent: #7C6FFF; --accent-dark: #5A4FCC; --green: #34D399; --red: #F87171;
            --text0: #FAFAFA; --text1: #D4D4D8; --text2: #A1A1AA; --text3: #71717A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg0); color: var(--text1); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: var(--bg2); border: 1px solid var(--bg4); border-radius: 16px; padding: 40px 32px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 24px; font-weight: 700; color: var(--accent); }
        .logo span { font-size: 12px; color: var(--text3); }
        .tabs { display: flex; gap: 4px; margin-bottom: 28px; background: var(--bg3); border-radius: 10px; padding: 4px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; background: transparent; border: none; color: var(--text3); cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 12px 14px; background: var(--bg3); border: 1px solid var(--bg4); border-radius: 10px; color: var(--text0); font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text3); }
        .btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
        .btn:hover { background: var(--accent-dark); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; }
        .message.error { display: block; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
        .message.success { display: block; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
        .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 4px; cursor: pointer; }
        .forgot-link:hover { text-decoration: underline; }
        #form-register, #form-forgot { display: none; }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text3); }
        .oauth-section { margin-bottom: 24px; }
        .oauth-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px 14px; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: 'Outfit', sans-serif; cursor: pointer; transition: opacity 0.2s; text-decoration: none; border: none; }
        .oauth-btn:hover { opacity: 0.85; }
        .oauth-btn-google { background: #fff; color: #3c4043; margin-bottom: 10px; }
        .oauth-btn-apple { background: #000; color: #fff; border: 1px solid var(--bg4); }
        .oauth-btn svg { flex-shrink: 0; }
        .oauth-divider { display: flex; align-items: center; gap: 16px; margin: 24px 0 0; color: var(--text3); font-size: 13px; }
        .oauth-divider::before, .oauth-divider::after { content: ''; flex: 1; height: 1px; background: var(--bg4); }
        .oauth-toast { display: none; padding: 10px 14px; border-radius: 10px; font-size: 12px; background: rgba(124,111,255,0.1); border: 1px solid rgba(124,111,255,0.3); color: var(--accent); margin-bottom: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>LeadFinder Pro</h1>
                <span>v3 — Deine Akquise-Maschine</span>
            </div>

            <div class="tabs" id="tabs">
                <button class="tab-btn active" onclick="showForm('login')">Login</button>
                <button class="tab-btn" onclick="showForm('register')">Registrieren</button>
            </div>

            <div class="oauth-section" id="oauth-section">
                <div id="oauth-toast" class="oauth-toast"></div>
                <a href="/api/auth/google" class="oauth-btn oauth-btn-google" onclick="return checkOAuth('google')">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.07 24.07 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Mit Google anmelden
                </a>
                <a href="/api/auth/apple" class="oauth-btn oauth-btn-apple" onclick="return checkOAuth('apple')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                    Mit Apple anmelden
                </a>
                <div class="oauth-divider">oder</div>
            </div>

            <div id="msg" class="message"></div>

            <!-- Login -->
            <form id="form-login" onsubmit="return doLogin(event)">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="login-email" placeholder="deine@email.de" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="login-pass" placeholder="Mindestens 8 Zeichen" required autocomplete="current-password">
                    <a class="forgot-link" onclick="showForm('forgot')">Passwort vergessen?</a>
                </div>
                <button type="submit" class="btn" id="btn-login">Einloggen</button>
            </form>

            <!-- Register -->
            <form id="form-register" onsubmit="return doRegister(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="reg-name" placeholder="Max Mustermann" required>
                </div>
                <div class="form-group">
                    <label>Firma (optional)</label>
                    <input type="text" id="reg-company" placeholder="Deine Firma GmbH">
                </div>
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="reg-email" placeholder="deine@email.de" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Passwort (min. 8 Zeichen)</label>
                    <input type="password" id="reg-pass" placeholder="Sicheres Passwort" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn" id="btn-register">Registrieren</button>
            </form>

            <!-- Forgot -->
            <form id="form-forgot" onsubmit="return doForgot(event)">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="forgot-email" placeholder="deine@email.de" required>
                </div>
                <button type="submit" class="btn">Reset-Link senden</button>
                <a class="forgot-link" style="text-align:center;display:block;margin-top:12px" onclick="showForm('login')">Zurueck zum Login</a>
            </form>
        </div>
        <div class="footer">LeadFinder Pro v3</div>
    </div>

    <script>
        // OAuth-Fehler aus URL-Parameter anzeigen
        (function() {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            if (error) {
                const messages = {
                    'oauth_not_configured': 'OAuth ist nicht konfiguriert. Bitte Client-IDs in den Umgebungsvariablen setzen.',
                    'invalid_state': 'Sicherheitsfehler — bitte erneut versuchen.',
                    'token_exchange_failed': 'Authentifizierung fehlgeschlagen — bitte erneut versuchen.',
                    'userinfo_failed': 'Benutzerinformationen konnten nicht abgerufen werden.',
                    'missing_user_info': 'Fehlende Benutzerinformationen vom Provider.',
                    'missing_id_token': 'Fehlende Authentifizierungsdaten von Apple.',
                    'token_decode_failed': 'Token-Verarbeitung fehlgeschlagen.',
                };
                const msg = messages[error] || decodeURIComponent(error);
                setTimeout(function() { showMsg(msg, 'error'); }, 50);
                history.replaceState(null, '', '/login');
            }
        })();

        function checkOAuth(provider) {
            // Wird aufgerufen bevor der Link navigiert — zeigt Toast wenn nicht konfiguriert
            // Server prueft ebenfalls und redirected mit error, daher hier nur return true
            return true;
        }

        function showForm(name) {
            document.getElementById('form-login').style.display = name === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = name === 'register' ? 'block' : 'none';
            document.getElementById('form-forgot').style.display = name === 'forgot' ? 'block' : 'none';
            const tabs = document.querySelectorAll('.tab-btn');
            tabs[0].classList.toggle('active', name === 'login' || name === 'forgot');
            tabs[1].classList.toggle('active', name === 'register');
            hideMsg();
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'message ' + type;
        }
        function hideMsg() {
            document.getElementById('msg').className = 'message';
        }

        async function doLogin(e) {
            e.preventDefault();
            hideMsg();
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.textContent = 'Wird eingeloggt...';
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-pass').value,
                    }),
                });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showMsg(data.error || 'Login fehlgeschlagen', 'error');
                }
            } catch (err) {
                showMsg('Netzwerkfehler: ' + err.message, 'error');
            }
            btn.disabled = false; btn.textContent = 'Einloggen';
            return false;
        }

        async function doRegister(e) {
            e.preventDefault();
            hideMsg();
            const btn = document.getElementById('btn-register');
            btn.disabled = true; btn.textContent = 'Wird registriert...';
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('reg-name').value,
                        company: document.getElementById('reg-company').value,
                        email: document.getElementById('reg-email').value,
                        password: document.getElementById('reg-pass').value,
                    }),
                });
                const data = await resp.json();
                if (data.ok) {
                    window.location.href = '/dashboard';
                } else {
                    showMsg(data.error || 'Registrierung fehlgeschlagen', 'error');
                }
            } catch (err) {
                showMsg('Netzwerkfehler: ' + err.message, 'error');
            }
            btn.disabled = false; btn.textContent = 'Registrieren';
            return false;
        }

        async function doForgot(e) {
            e.preventDefault();
            hideMsg();
            try {
                const resp = await fetch('/api/auth/password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('forgot-email').value }),
                });
                const data = await resp.json();
                showMsg(data.message || 'Reset-Link gesendet', 'success');
            } catch (err) {
                showMsg('Netzwerkfehler', 'error');
            }
            return false;
        }
    </script>
</body>
</html>
